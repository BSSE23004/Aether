[profile.default]
solc_version = "0.8.20"

[dependencies]
@openzeppelin/contracts = { git = "https://github.com/OpenZeppelin/openzeppelin-contracts.git", tag = "v4.9.3" }

[rpc_endpoints]
base_sepolia = "https://sepolia.base.org"
mainnet = "https://eth-mainnet.g.alchemy.com/v2/demo"

[etherscan]
base_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 84532 }

[fmt]
multiline_func_header = "all"
wrap_comments = true
comment_width = 80
