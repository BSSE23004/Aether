[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
verbosity = 3
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
]

# See more config options https://github.com/foundry-rs/foundry/tree/master/config

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
base_sepolia_alt = "https://sepolia.base.org"
mainnet = "https://eth-mainnet.g.alchemy.com/v2/demo"
localhost = "http://localhost:8545"

[etherscan]
base_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 84532, url = "https://api-sepolia.basescan.org/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "params_first_multi"
quote_style = "double"
number_underscore = "thousands"
single_line_statement_blocks = "preserve"
wrap_comments = true
ignore = ["src/test/**"]

[fuzz]
runs = 256
max_test_rejects = 65536
dictionary_weight = 40
include_storage = true

[invariant]
runs = 256
depth = 15
fail_on_revert = false

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 1000 }
gas_reports = ["AetherCommunity", "AetherGovernance", "AetherMembership", "Governor", "MembershipPass", "CommunityRegistry"]
